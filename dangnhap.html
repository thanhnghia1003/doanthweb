<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập - Đăng ký</title>

    <link rel="stylesheet" href="style/dangnhap.css">
</head>

<body class="login-page">
    <!-- NÚT QUAY VỀ TRANG CHỦ -->
    <a href="index.html" class="home-btn">

        ← Trang chủ

    </a>
    <div class="container">

        <div class="form-box">

            <!-- TITLE -->
            <h1>Book Store</h1>

            <p class="subtitle">
                Vui lòng đăng nhập vào tài khoản của bạn
            </p>

            <!-- TAB -->
            <div class="tabs">

                <button class="tab-btn active" onclick="showLogin()">

                    Đăng nhập

                </button>

                <button class="tab-btn" onclick="showRegister()">

                    Đăng kí

                </button>

            </div>
            <!-- FORM QUÊN MẬT KHẨU -->
            <form id="forgotForm" style="display: none;">

                <label>Email khôi phục</label>

                <div class="input-box">

                    <!-- ICON -->
                    <img src="images/user-regular.png" alt="">

                    <input type="email" placeholder="Nhập email của bạn">

                </div>

                <button type="submit" class="main-btn">

                    Gửi mã xác nhận

                </button>

            </form>
            <!-- FORM ĐĂNG NHẬP -->
            <form id="loginForm">

                <!-- EMAIL -->
                <label>Email / Số điện thoại</label>

                <div class="input-box">

                    <!-- ICON -->
                    <img src="images/user-regular.png" alt="">

                    <input type="text" placeholder="Nhập email hoặc số điện thoại">

                </div>

                <!-- PASSWORD -->
                <label>Mật khẩu</label>

                <div class="input-box">

                    <!-- ICON -->
                    <img src="images/lock.png" alt="">

                    <input type="password" placeholder="Nhập mật khẩu của bạn">



                </div>

                <!-- OPTIONS -->
                <div class="options">

                    <div class="remember">

                        <input type="checkbox">

                        <span>Ghi nhớ đăng nhập</span>

                    </div>

                    <a href="#" onclick="showForgotPassword()">

                        Quên mật khẩu?

                    </a>

                </div>

                <!-- BUTTON -->
                <button type="submit" class="main-btn">

                    Đăng nhập

                </button>

            </form>

            <!-- FORM ĐĂNG KÝ -->
            <form id="registerForm" style="display: none;">

                <!-- NAME -->
                <label>Họ và tên</label>

                <div class="input-box">

                    <!-- ICON -->
                    <img src="images/user-regular.png" alt="">

                    <input type="text" placeholder="Nhập họ và tên">

                </div>

                <!-- EMAIL -->
                <label>Email</label>

                <div class="input-box">

                    <!-- ICON -->
                    <img src="images/user-regular.png" alt="">

                    <input type="email" placeholder="Nhập email">

                </div>

                <!-- PASSWORD -->
                <label>Mật khẩu</label>

                <div class="input-box">

                    <!-- ICON -->
                    <img src="images/lock.png" alt="">

                    <input type="password" placeholder="Nhập mật khẩu">

                </div>

                <!-- RE PASSWORD -->
                <label>Nhập lại mật khẩu</label>

                <div class="input-box">

                    <!-- ICON -->
                    <img src="images/lock.png" alt="">

                    <input type="password" placeholder="Nhập lại mật khẩu">

                </div>

                <!-- BUTTON -->
                <button type="submit" class="main-btn">

                    Đăng kí

                </button>

            </form>

            <!-- SOCIAL -->
            <div class="social-text">

                Hoặc đăng nhập với

            </div>

            <div class="social-buttons">

                <!-- GOOGLE -->
                <button>

                    <img src="images/google-brands-solid.png" alt="">

                    Google

                </button>

                <!-- FACEBOOK -->
                <button>

                    <img src="images/fb.png" alt="">

                    Facebook

                </button>

            </div>

        </div>

    </div>

    <script>

        const loginForm =
            document.getElementById("loginForm");

        const registerForm =
            document.getElementById("registerForm");

        const forgotForm =
            document.getElementById("forgotForm");

        const tabs =
            document.querySelectorAll(".tab-btn");

        /* ĐĂNG NHẬP */
        function showLogin() {

            loginForm.style.display = "block";

            registerForm.style.display = "none";

            forgotForm.style.display = "none";

            tabs[0].classList.add("active");

            tabs[1].classList.remove("active");
        }

        /* ĐĂNG KÝ */
        function showRegister() {

            loginForm.style.display = "none";

            registerForm.style.display = "block";

            forgotForm.style.display = "none";

            tabs[1].classList.add("active");

            tabs[0].classList.remove("active");
        }

        /* QUÊN MẬT KHẨU */
        function showForgotPassword() {

            loginForm.style.display = "none";

            registerForm.style.display = "none";

            forgotForm.style.display = "block";

            tabs[0].classList.remove("active");

            tabs[1].classList.remove("active");
        }

    </script>

</body>

</html>
