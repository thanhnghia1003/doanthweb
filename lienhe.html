    <!-- TITLE -->
    <h1 class="contact-title">

        Liên hệ với chúng tôi

    </h1>

    <!-- CONTACT -->
    <section class="contact-container">

        <!-- LEFT -->
        <div class="contact-form">

            <h2>Gửi tin nhắn</h2>

            <div class="row">

                <!-- NAME -->
                <div class="input-group">

                    <label>HỌ VÀ TÊN</label>

                    <input type="text" placeholder="Nguyễn Văn A">

                </div>

                <!-- EMAIL -->
                <div class="input-group">

                    <label>EMAIL</label>

                    <input type="email" placeholder="example@gmail.com">

                </div>

            </div>

            <!-- SUBJECT -->
            <div class="input-group">

                <label>CHỦ ĐỀ</label>

                <input type="text" placeholder="Bạn cần hỗ trợ về điều gì?">

            </div>

            <!-- MESSAGE -->
            <div class="input-group">

                <label>NỘI DUNG</label>

                <textarea placeholder="Nhập tin nhắn của bạn tại đây..."></textarea>

            </div>

            <!-- BUTTON -->
            <button class="send-btn">

                Gửi tin nhắn

                <img src="images/sendmsg.png" alt="">

            </button>

        </div>

        <!-- RIGHT -->
        <div class="contact-right">

            <!-- INFO -->
            <div class="contact-info">

                <h2>Thông tin liên hệ</h2>

                <!-- ITEM -->
                <div class="info-item">

                    <img src="images/location-dot-solid.png" alt="">

                    <div>

                        <span>ĐỊA CHỈ</span>

                        <p>
                            123 Đường Sách,
                            Quận 1, TP.HCM
                        </p>

                    </div>

                </div>

                <!-- ITEM -->
                <div class="info-item">

                    <img src="images/dt.png" alt="">

                    <div>

                        <span>ĐIỆN THOẠI</span>

                        <p>0886194451</p>

                    </div>

                </div>

                <!-- ITEM -->
                <div class="info-item">

                    <img src="images/mail.png" alt="">

                    <div>

                        <span>EMAIL</span>

                        <p>
                            thanhnghia100305@gmail.com
                        </p>

                    </div>

                </div>

            </div>

            <!-- MAP -->
            <a href="https://www.google.com/maps/place/123+Đường+Sách" target="_blank" class="map">

                <img src="images/map.png" alt="">

            </a>

        </div>

    </section>
