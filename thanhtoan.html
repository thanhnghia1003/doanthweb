<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Thanh toán</title>

    <link rel="stylesheet"
        href="style/style.css">

</head>

<body>

    <!-- HEADER -->
    <header>

        <!-- LOGO -->
        <div class="logo">

            <img src="images/logo.png" alt="">

            <span>Book Store</span>

        </div>

        <!-- SEARCH -->
        <div class="search-box">

            <input type="text"
                placeholder="Tìm kiếm...">

            <button class="search-btn">

                <img src="images/magnifying-glass-solid.png" alt="">

            </button>

        </div>

        <!-- ICON -->
        <div class="header-icons">

            

            <a href="giohang.html">
                <img src="images/cart-arrow-down-solid.png" alt="">
            </a>

            <a href="dangnhap.html">
                <img src="images/house-user-solid.png" alt="">
            </a>

        </div>

    </header>

    <!-- NAVBAR -->
    <nav>

        <ul>

            <li>
                <a href="index.html">
                    Trang chủ
                </a>
            </li>

            <li>
                <a href="lienhe.html">
                    Liên hệ
                </a>
            </li>

            <li>
                <a href="gioithieu.html">
                    Giới thiệu
                </a>
            </li>

            <!-- DROPDOWN -->
            <li class="dropdown">

                <a href="sanpham.html">

                    Sản phẩm

                    <img src="images/arrow-down-solid.png" alt="">

                </a>

                <ul class="dropdown-menu">

                    <li>
                        <a href="truyentranh.html">
                            Truyện tranh
                        </a>
                    </li>

                    <li>
                        <a href="tieuthuyet.html">
                            Tiểu thuyết
                        </a>
                    </li>

                    <li>
                        <a href="vanhoc.html">
                            Văn học
                        </a>
                    </li>

                    <li>
                        <a href="manga.html">
                            Manga
                        </a>
                    </li>

                </ul>

            </li>

            <li>
                <a href="tintuc.html">
                    Tin tức
                </a>
            </li>

        </ul>

    </nav>

    <!-- THANH TOÁN -->
    <section class="payment-container">

        <h1>Thanh toán đơn hàng</h1>

        <div class="payment-box">

            <!-- LEFT -->
            <div class="payment-left">

                <h2>Thông tin nhận hàng</h2>

                <input type="text"
                    placeholder="Họ và tên">

                <input type="text"
                    placeholder="Số điện thoại">

                <input type="text"
                    placeholder="Địa chỉ">

                <textarea
                    placeholder="Ghi chú"></textarea>

            </div>

            <!-- RIGHT -->
            <div class="payment-right">

                <h2>Đơn hàng</h2>

                <div class="payment-product">

                    <img id="payment-image"
                        src=""
                        alt="">

                    <div>

                        <h3 id="payment-name"></h3>

                        <p id="payment-price"></p>

                    </div>

                </div>

                <div class="payment-total">

                    Tổng:
                    <span id="payment-total"></span>

                </div>

                <button class="pay-btn">

                    Xác nhận thanh toán

                </button>

            </div>

        </div>

    </section>

    <script src="js/thanhtoan.js"></script>

</body>

</html>
